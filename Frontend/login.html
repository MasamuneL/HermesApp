<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HERMES — Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c; --gold-light: #f0d080;
      --gold-dim: rgba(201,168,76,0.35); --dark: #0a0a0c;
      --text: #1a1408; --muted: #9a8a6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff; font-family: 'Outfit', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card { text-align: center; width: 100%; max-width: 400px; padding: 48px 40px; }
    .logo-circle {
      width: 130px; height: 130px; border-radius: 50%;
      border: 2px solid var(--gold-dim); margin: 0 auto 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--white); overflow: hidden;
      box-shadow: 0 8px 40px rgba(201,168,76,0.2);
      animation: fadeDown 0.6s ease forwards;
    }
    .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
    h1 {
      font-family: 'Cormorant Garamond', serif; font-size: 2.2rem;
      font-weight: 700; color: var(--text); letter-spacing: 0.2em;
      animation: fadeUp 0.6s 0.1s ease forwards; opacity: 0;
    }
    .subtitle {
      font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--muted); margin-top: 6px; margin-bottom: 44px;
      animation: fadeUp 0.6s 0.15s ease forwards; opacity: 0;
    }
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.2s ease forwards; opacity: 0;
    }
    .btn {
      display: block; width: 100%; padding: 15px 24px;
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
      letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s ease; border-radius: 2px;
    }
    .btn-google {
      background: transparent;
      color: var(--gold-light); border: 1px solid var(--gold);
      animation: fadeUp 0.6s 0.25s ease forwards; opacity: 0;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #fff; box-shadow: 0 6px 24px rgba(201,168,76,0.3);
      transform: translateY(-1px);
    }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg {
      margin-top: 16px; padding: 10px 14px;
      background: #fde8e8; border: 1px solid #f5c6c6;
      color: #c0392b; font-size: 12px; border-radius: 2px;
      display: none;
    }
    .footer-text {
      margin-top: 36px; font-size: 10px; color: #ccc0aa; letter-spacing: 0.1em;
      animation: fadeUp 0.6s 0.4s ease forwards; opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-circle">
      <img src="LogoHermes.png" alt="HERMES"
        onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<span style=\'font-family:Cormorant Garamond,serif;font-size:36px;color:#c9a84c;font-weight:600;\'>H</span>')" />
    </div>
    <h1>HERMES</h1>
    <p class="subtitle">Sistema de Gestión</p>
    <div class="divider"></div>

    <button class="btn btn-google" id="btnGoogle" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.705A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.705V4.963H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.037l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.963L3.964 6.295C4.672 4.169 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </button>

    <div class="error-msg" id="errorMsg"></div>
    <p class="footer-text">Google OAuth 2.0</p>
  </div>

  <script>
    const API_BASE = "http://localhost:8000";
    const GOOGLE_CLIENT_ID = "486932937666-23r90cvcs0l5rib6imbk7h9r5r4miu2a.apps.googleusercontent.com";
    const SCOPES = "openid email profile https://www.googleapis.com/auth/calendar";

    // Si ya hay sesión activa, redirige directo al main
    if (sessionStorage.getItem("google_token")) {
      window.location.href = "main.html";
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg; el.style.display = "block";
    }

    function setLoading(val) {
      document.getElementById("btnGoogle").disabled = val;
    }

    let tokenClient = null;

    function getTokenClient() {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: SCOPES,
          // false = solicita todos los scopes cada vez, no sólo los ya concedidos.
          // Sin esto, usuarios que hicieron login previo sin scope de Calendar
          // recibirían un token sin Calendar y el backend devolvería 403.
          include_granted_scopes: false,
          callback: handleTokenResponse,
        });
      }
      return tokenClient;
    }

    async function handleTokenResponse(resp) {
      if (resp.error) {
        showError("Error al iniciar sesión con Google. Intenta de nuevo.");
        setLoading(false);
        return;
      }

      const token = resp.access_token;

      try {
        // Obtener info del usuario
        const userRes = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!userRes.ok) throw new Error("No se pudo obtener info del usuario");
        const userInfo = await userRes.json();

        // Guardar en sessionStorage
        sessionStorage.setItem("google_token", token);
        sessionStorage.setItem("token_expires_at", String(Date.now() + (resp.expires_in ?? 3600) * 1000));
        sessionStorage.setItem("user_info", JSON.stringify({
          email: userInfo.email,
          name: userInfo.name,
          sub: userInfo.sub,
          picture: userInfo.picture,
        }));

        // Registrar en PostgreSQL (201 = nuevo, 200 = ya existía — ambos OK)
        await fetch(`${API_BASE}/api/users/register`, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          }
        });

        window.location.href = "main.html";

      } catch (err) {
        sessionStorage.clear();
        showError("Error al iniciar sesión. Intenta de nuevo.");
        setLoading(false);
      }
    }

    window.handleGoogleLogin = function() {
      setLoading(true);
      getTokenClient().requestAccessToken();
    };
  </script>
</body>
</html>
