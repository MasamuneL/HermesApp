<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HERMES — Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c; --gold-light: #f0d080;
      --gold-dim: rgba(201,168,76,0.35); --dark: #0a0a0c;
      --text: #1a1408; --muted: #9a8a6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff; font-family: 'Outfit', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card { text-align: center; width: 100%; max-width: 400px; padding: 48px 40px; }
    .logo-circle {
      width: 130px; height: 130px; border-radius: 50%;
      border: 2px solid var(--gold-dim); margin: 0 auto 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--white); overflow: hidden;
      box-shadow: 0 8px 40px rgba(201,168,76,0.2);
      animation: fadeDown 0.6s ease forwards;
    }
    .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
    h1 {
      font-family: 'Cormorant Garamond', serif; font-size: 2.2rem;
      font-weight: 700; color: var(--text); letter-spacing: 0.2em;
      animation: fadeUp 0.6s 0.1s ease forwards; opacity: 0;
    }
    .subtitle {
      font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--muted); margin-top: 6px; margin-bottom: 44px;
      animation: fadeUp 0.6s 0.15s ease forwards; opacity: 0;
    }
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.2s ease forwards; opacity: 0;
    }
    .btn {
      display: block; width: 100%; padding: 15px 24px;
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
      letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s ease; border-radius: 2px;
    }
    .btn-primary {
      background: transparent;
      color: var(--gold-light); border: 1px solid var(--gold);
      margin-bottom: 14px;
      animation: fadeUp 0.6s 0.25s ease forwards; opacity: 0;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--white); box-shadow: 0 6px 24px rgba(201,168,76,0.3);
      transform: translateY(-1px);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: transparent; 
      color: var(--gold-light);
      border: 1px solid var(--gold);
      animation: fadeUp 0.6s 0.25s ease forwards; opacity: 0;
    }
    .btn-secondary:hover {background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--white); box-shadow: 0 6px 24px rgba(201,168,76,0.3);
      transform: translateY(-1px);}
    .error-msg {
      margin-top: 16px; padding: 10px 14px;
      background: #fde8e8; border: 1px solid #f5c6c6;
      color: #c0392b; font-size: 12px; border-radius: 2px;
      display: none;
    }
    .footer-text {
      margin-top: 36px; font-size: 10px; color: #ccc0aa; letter-spacing: 0.1em;
      animation: fadeUp 0.6s 0.4s ease forwards; opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-circle">
      <img src="LogoHermes.png" alt="HERMES"
        onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<span style=\'font-family:Cormorant Garamond,serif;font-size:36px;color:#c9a84c;font-weight:600;\'>H</span>')" />
    </div>
    <h1>HERMES</h1>
    <p class="subtitle">Sistema de Gestión</p>
    <div class="divider"></div>
    <button class="btn btn-primary" id="btnLogin" onclick="handleLogin()">Iniciar Sesión</button>
    <button class="btn btn-secondary" id="btnSignup" onclick="handleSignup()">Crear Cuenta</button>
    <div class="error-msg" id="errorMsg"></div>
    <p class="footer-text">Powered by Firebase Auth</p>
  </div>

  <script type="module">
    import {
      auth, API_BASE,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged
    } from "./firebase.js";

    // Si ya hay sesión activa, redirige directo al main
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = "main.html";
    });

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg; el.style.display = "block";
    }
    function setLoading(val) {
      document.getElementById("btnLogin").disabled  = val;
      document.getElementById("btnSignup").disabled = val;
    }

    window.handleLogin = async function() {
      const email    = prompt("Correo electrónico:");
      const password = prompt("Contraseña:");
      if (!email || !password) return;

      setLoading(true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "main.html";
      } catch (err) {
        showError(firebaseError(err.code));
        setLoading(false);
      }
    };

    window.handleSignup = async function() {
      const email    = prompt("Correo electrónico:");
      const password = prompt("Contraseña (mínimo 6 caracteres):");
      if (!email || !password) return;

      setLoading(true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        // Registra al usuario en PostgreSQL después de Firebase
        const token = await cred.user.getIdToken();
        await fetch(`${API_BASE}/api/users/register`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" }
        });
        window.location.href = "main.html";
      } catch (err) {
        showError(firebaseError(err.code));
        setLoading(false);
      }
    };

    function firebaseError(code) {
      const msgs = {
        "auth/user-not-found":    "No existe una cuenta con ese correo.",
        "auth/wrong-password":    "Contraseña incorrecta.",
        "auth/email-already-in-use": "Este correo ya está registrado.",
        "auth/weak-password":     "La contraseña debe tener al menos 6 caracteres.",
        "auth/invalid-email":     "Correo electrónico inválido.",
      };
      return msgs[code] || "Error al iniciar sesión. Intenta de nuevo.";
    }
  </script>
</body>
</html>
