<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HERMES — Perfil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --gold:#c9a84c; --gold-light:#f0d080; --gold-dim:rgba(201,168,76,0.3); --dark:#0a0a0c; --text:#1a1408; --muted:#9a8a6a; --surface:#f9f7f3; --border:#e8dcc8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#fff; color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
    header { background:#fff; border-bottom:1px solid var(--border); padding:14px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .menu-btn { display:flex; align-items:center; gap:8px; padding:8px 16px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Outfit',sans-serif; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; border-radius:2px; transition:all 0.2s; }
    .menu-btn:hover { border-color:var(--gold); color:var(--gold); }
    .logo-area { display:flex; align-items:center; gap:12px; cursor:pointer; transition:opacity 0.2s; text-decoration:none; }
    .logo-area:hover { opacity:0.75; }
    .logo-img { width:42px; height:42px; border-radius:50%; background:var(--white); border:1px solid var(--gold-dim); overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .logo-img img { width:100%; height:100%; object-fit:cover; }
    .logo-name { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:700; letter-spacing:0.2em; color:var(--text); }
    .avatar-btn { width:40px; height:40px; border-radius:50%; background:var(--white); border:2px solid var(--gold-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color 0.2s; }
    .avatar-btn:hover { border-color:var(--gold); }
    .dropdown { display:none; position:absolute; top:72px; left:32px; background:#fff; border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,0.08); min-width:200px; z-index:200; }
    .dropdown.open { display:block; }
    .dropdown a { display:block; padding:12px 20px; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text); text-decoration:none; border-bottom:1px solid var(--border); transition:background 0.15s, color 0.15s; }
    .dropdown a:last-child { border-bottom:none; }
    .dropdown a:hover { background:var(--surface); color:var(--gold); }
    .nav-bar { padding:12px 32px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; gap:12px; }
    .nav-link { padding:9px 20px; font-size:12px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); background:transparent; border:1px solid transparent; border-radius:2px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
    .nav-link:hover, .nav-link.active { color:var(--gold); border-color:var(--gold-dim); background:rgba(201,168,76,0.05); }
    main { max-width:720px; margin:0 auto; padding:48px 32px; width:100%; animation:fadeUp 0.5s ease forwards; }
    .photo-section { display:flex; flex-direction:column; align-items:center; margin-bottom:40px; gap:16px; }
    .photo-wrapper { position:relative; width:120px; height:120px; }
    .photo-circle { width:120px; height:120px; border-radius:50%; background:var(--white); border:2px solid var(--gold-dim); overflow:hidden; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 24px rgba(201,168,76,0.15); }
    .photo-circle img { width:100%; height:100%; object-fit:cover; }
    .photo-initials { font-family:'Cormorant Garamond',serif; font-size:2.5rem; font-weight:600; color:var(--gold); }
    .photo-edit-btn { position:absolute; bottom:4px; right:4px; width:30px; height:30px; border-radius:50%; background:var(--gold); border:2px solid #fff; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.2s; font-size:13px; }
    .photo-edit-btn:hover { background:var(--gold-light); }
    #photoInput { display:none; }
    .profile-name-display { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:600; letter-spacing:0.05em; color:var(--text); text-align:center; }
    .profile-role { font-size:11px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); }
    .gold-divider { height:1px; background:linear-gradient(to right, transparent, var(--gold-dim), transparent); margin:8px 0 36px; }
    .form-section-title { font-size:10px; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:20px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:32px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); font-weight:500; }
    .field input, .field select { padding:11px 14px; border:1px solid var(--border); background:var(--surface); font-family:'Outfit',sans-serif; font-size:14px; color:var(--text); outline:none; transition:border-color 0.2s, background 0.2s; border-radius:2px; appearance:none; }
    .field input:focus, .field select:focus { border-color:var(--gold); background:#fff; }
    .field input:disabled { background:#f5f5f5; color:var(--muted); cursor:not-allowed; }
    .date-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .actions { display:flex; gap:12px; justify-content:flex-end; margin-top:8px; }
    .btn { padding:12px 28px; font-family:'Outfit',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; border-radius:2px; transition:all 0.2s; }
    .btn-primary { background:var(--white); color:var(--gold-light); border:1px solid var(--gold-light); }
    .btn-primary:hover { background:#2d2410; }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-secondary { background:transparent; color:var(--muted); border:1px solid var(--border); }
    .btn-secondary:hover { border-color:var(--muted); color:var(--text); }
    .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--white); color:var(--gold-light); padding:12px 28px; font-size:13px; letter-spacing:0.05em; border:1px solid var(--gold-dim); border-radius:2px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:500; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <header>
    <button class="menu-btn" onclick="toggleMenu()">☰ Menú</button>
    <a href="main.html" class="logo-area" style="text-decoration:none;">
      <div class="logo-img">
        <img src="LogoHermes.png" alt="H"
          onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<span style=\'color:#c9a84c;font-size:18px;font-weight:700;\'>H</span>')" />
      </div>
      <span class="logo-name">HERMES</span>
    </a>
    <div class="avatar-btn" onclick="window.location.href='perfil.html'">
      <span style="color:#c9a84c;font-size:16px;">👤</span>
    </div>
    <div class="dropdown" id="mainMenu">
      <a href="main.html">🏠 Inicio</a>
      <a href="perfil.html">👤 Perfil</a>
      <a href="ranking.html">🏆 Ranking</a>
      <a href="calendario.html">📅 Calendario</a>
      <a href="logros.html">⭐ Logros</a>
      <a href="#" onclick="handleLogout()">↩ Cerrar Sesión</a>
    </div>
  </header>
  <div class="nav-bar">
    <a class="nav-link" href="ranking.html">🏆 Ranking</a>
    <a class="nav-link" href="calendario.html">📅 Calendario y Chat</a>
    <a class="nav-link" href="logros.html">⭐ Logros</a>
  </div>
  <main>
    <div class="photo-section">
      <div class="photo-wrapper">
        <div class="photo-circle" id="photoCircle">
          <span class="photo-initials" id="photoInitials">—</span>
        </div>
        <div class="photo-edit-btn" onclick="document.getElementById('photoInput').click()">✏️</div>
        <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoChange(event)"/>
      </div>
      <h1 class="profile-name-display" id="profileNameDisplay">Cargando...</h1>
      <span class="profile-role">Estudiante</span>
    </div>
    <div class="gold-divider"></div>

    <!-- Datos personales -->
    <p class="form-section-title">Datos Personales</p>
    <div class="form-grid">
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="fieldNombre" placeholder="Tu nombre completo"/>
      </div>
      <div class="field">
        <label>Correo electrónico</label>
        <!-- El correo viene de Firebase, no es editable -->
        <input type="email" id="fieldCorreo" disabled/>
      </div>
      <div class="field" style="grid-column:1/-1;">
        <label>Fecha de nacimiento</label>
        <div class="date-row">
          <input type="number" id="fieldDia"  placeholder="Día"  min="1" max="31"/>
          <select id="fieldMes">
            <option value="">Mes</option>
            <option value="1">Enero</option><option value="2">Febrero</option>
            <option value="3">Marzo</option><option value="4">Abril</option>
            <option value="5">Mayo</option><option value="6">Junio</option>
            <option value="7">Julio</option><option value="8">Agosto</option>
            <option value="9">Septiembre</option><option value="10">Octubre</option>
            <option value="11">Noviembre</option><option value="12">Diciembre</option>
          </select>
          <input type="number" id="fieldAnio" placeholder="Año" min="1950" max="2015"/>
        </div>
      </div>
    </div>

    <!-- Datos académicos -->
    <p class="form-section-title">Datos Académicos</p>
    <div class="form-grid">
      <div class="field">
        <label>Universidad / Institución</label>
        <input type="text" id="fieldUniversidad" placeholder="Nombre de tu universidad"/>
      </div>
      <div class="field">
        <label>Carrera</label>
        <!-- Viene de u_degree en el schema -->
        <input type="text" id="fieldCarrera" placeholder="Ej. Ingeniería en Sistemas"/>
      </div>
      <div class="field">
        <label>Semestre / Año en curso</label>
        <!-- Viene de semester en el schema -->
        <select id="fieldSemestre">
          <option value="">Selecciona</option>
          <option value="1">1er semestre</option><option value="2">2do semestre</option>
          <option value="3">3er semestre</option><option value="4">4to semestre</option>
          <option value="5">5to semestre</option><option value="6">6to semestre</option>
          <option value="7">7mo semestre</option><option value="8">8vo semestre</option>
          <option value="9">9no semestre</option><option value="10">10mo semestre</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="cancelEdit()">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="saveProfile()">Guardar cambios</button>
    </div>
  </main>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { requireAuth, authHeaders, API_BASE, signOut, fetchWithAuth, getToken } from "./auth.js";

    let originalData = {};

    requireAuth(async user => {
      // Correo de Firebase (solo lectura)
      document.getElementById("fieldCorreo").value = user.email;
      await loadProfile();
      // Actualiza nombre en tiempo real
      document.getElementById("fieldNombre").addEventListener("input", e => {
        updateNameDisplay(e.target.value);
      });
    });

    async function loadProfile() {
      try {
        // GET /api/users/me — UserResponse: { usr_id, name, u_degree, semester, email }
        const res = await fetchWithAuth(`${API_BASE}/api/users/me`, { headers: await authHeaders() });
        if (!res.ok) throw new Error();
        const data = await res.json();
        fillForm(data);
        originalData = { ...data };
      } catch {
        showToast("No se pudo cargar el perfil", true);
      }
    }

    function fillForm(data) {
      document.getElementById("fieldNombre").value      = data.full_name   || "";
      document.getElementById("fieldCarrera").value     = data.u_degree    || "";
      document.getElementById("fieldSemestre").value    = data.semester    || "";
      document.getElementById("fieldUniversidad").value = data.universidad || "";
      if (data.birth_date) {
        const [anio, mes, dia] = data.birth_date.split("-");
        document.getElementById("fieldDia").value  = parseInt(dia,  10);
        document.getElementById("fieldMes").value  = parseInt(mes,  10);
        document.getElementById("fieldAnio").value = parseInt(anio, 10);
      }
      if (data.photo_url) setPhoto(`${API_BASE}${data.photo_url}`);
      updateNameDisplay(data.full_name);
    }

    function updateNameDisplay(nombre) {
      document.getElementById("profileNameDisplay").textContent = nombre || "Sin nombre";
      const parts = (nombre || "").trim().split(" ");
      document.getElementById("photoInitials").textContent = parts.length >= 2
        ? (parts[0][0] + parts[1][0]).toUpperCase()
        : (parts[0]?.[0] || "?").toUpperCase();
    }

    window.saveProfile = async function() {
      const nombre = document.getElementById("fieldNombre").value.trim();
      if (!nombre) { showToast("El nombre no puede estar vacío", true); return; }

      document.getElementById("btnGuardar").disabled = true;

      try {
        const params = new URLSearchParams();
        params.set("full_name", nombre);

        const carrera = document.getElementById("fieldCarrera").value.trim();
        if (carrera) params.set("u_degree", carrera);

        const semestre = document.getElementById("fieldSemestre").value;
        if (semestre) params.set("semester", semestre);

        const uni = document.getElementById("fieldUniversidad").value.trim();
        if (uni) params.set("universidad", uni);

        const dia  = document.getElementById("fieldDia").value;
        const mes  = document.getElementById("fieldMes").value;
        const anio = document.getElementById("fieldAnio").value;
        if (dia && mes && anio) {
          const mm = String(mes).padStart(2, "0");
          const dd = String(dia).padStart(2, "0");
          params.set("birth_date", `${anio}-${mm}-${dd}`);
        }

        const res = await fetchWithAuth(
          `${API_BASE}/api/users/me?${params.toString()}`,
          { method: "PUT", headers: await authHeaders() }
        );
        if (!res.ok) throw new Error();
        const updated = await res.json();
        originalData = { ...updated };
        showToast("✓ Perfil actualizado correctamente");
      } catch {
        showToast("Error al guardar el perfil", true);
      }

      document.getElementById("btnGuardar").disabled = false;
    };

    window.cancelEdit = function() {
      fillForm(originalData);
      showToast("Cambios descartados");
    };

    window.handlePhotoChange = async function(event) {
      const file = event.target.files[0];
      if (!file) return;

      // Preview inmediato
      const reader = new FileReader();
      reader.onload = e => setPhoto(e.target.result);
      reader.readAsDataURL(file);

      // Subir al backend (sin Content-Type para que el browser ponga el boundary)
      try {
        const formData = new FormData();
        formData.append("foto", file);
        const res = await fetchWithAuth(`${API_BASE}/api/users/foto`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${getToken()}` },
          body: formData,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || "Error");
        }
        const updated = await res.json();
        originalData = { ...updated };
        showToast("✓ Foto actualizada");
      } catch (e) {
        showToast(e.message || "Error al subir la foto", true);
      }
    };

    function setPhoto(src) {
      const circle = document.getElementById("photoCircle");
      document.getElementById("photoInitials").style.display = "none";
      const old = circle.querySelector("img"); if (old) old.remove();
      const img = document.createElement("img"); img.src = src;
      img.onerror = () => { img.remove(); document.getElementById("photoInitials").style.display = ""; };
      circle.appendChild(img);
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.color = isError ? "#e74c3c" : "var(--gold-light)";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    window.handleLogout = async () => { signOut(); window.location.href = "login.html"; };
    window.toggleMenu   = () => document.getElementById("mainMenu").classList.toggle("open");
    document.addEventListener("click", e => {
      if (!e.target.closest(".menu-btn") && !e.target.closest(".dropdown"))
        document.getElementById("mainMenu").classList.remove("open");
    });
  </script>
</body>
</html>
