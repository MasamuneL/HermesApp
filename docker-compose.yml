services:
  postgres:
    image: postgres:15-alpine
    container_name: hermes_postgres
    environment:
      POSTGRES_USER: hermes_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hermes
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes_user -d hermes"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes_network

  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes_backend
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hermes_network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: hermes_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hermes_network

networks:
  hermes_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
