services:
  postgres:
    image: postgres:15-alpine
    container_name: hermes_postgres
    environment:
      POSTGRES_USER: hermes_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hermes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes_user -d hermes"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes_network

  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hermes_network

networks:
  hermes_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
